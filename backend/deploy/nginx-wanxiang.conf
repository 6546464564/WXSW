server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25M;
    access_log /var/log/nginx/wanxiang-access.log;
    error_log /var/log/nginx/wanxiang-error.log;

    # ============ 品牌主页 ============
    # 万象书屋: 仅根路径 / 走静态品牌页 (= 精确匹配, 优先级最高).
    # /index.html 也走静态, 避免 SEO 抓两次不同内容.
    location = / {
        root /opt/wanxiang/web;
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300";
    }
    location = /index.html {
        root /opt/wanxiang/web;
        add_header Cache-Control "public, max-age=300";
    }

    # 静态资源 (favicon 等). 品牌页内联了 favicon SVG 没单独文件,
    # 这里留个口子, 以后加图片/css/js 再用.
    location /web/ {
        alias /opt/wanxiang/web/;
        autoindex off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ============ APK 下载 ============
    # 嵌套 location 不能用 (内层不继承 alias),
    # 直接把 add_header 写在外层用 if + 文件后缀判断.
    location /dl/ {
        alias /opt/wanxiang/dl/;
        autoindex off;
        types {
            application/vnd.android.package-archive apk;
            text/html html;
        }
        sendfile on;
        sendfile_max_chunk 1m;

        # APK 强制下载 + 不缓存 (apk 文件名带版本号, 用 latest 别名时下次拉新版本)
        if ($request_uri ~* "\.apk$") {
            add_header Content-Disposition 'attachment';
            add_header Cache-Control 'no-store';
        }
    }

    # ============ 后端 (admin / api / metrics / docs) ============
    # 默认 location, 优先级低于上面的 = 精确匹配, 所以不会拦截 /.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
