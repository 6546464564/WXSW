# ============================================================
# 万象书屋 nginx 配置 (HTTPS 版)
# ============================================================
#
# 用途: 域名 + ICP 备案 + Let's Encrypt 证书都搞好后, 用这个替换
#       /etc/nginx/sites-available/wanxiang, 一句 systemctl reload nginx 即生效.
#
# 前置条件:
#   1. 已买域名 (如 api.wanxiangbook.com), DNS A 记录指向 104.224.156.240
#   2. 已 ICP 备案 (大陆 App Store 上架必须)
#   3. 服务器已装 certbot (apt install certbot python3-certbot-nginx -y)
#   4. 已申请证书:
#      certbot certonly --nginx -d api.wanxiangbook.com -d wanxiangbook.com
#      → 证书在 /etc/letsencrypt/live/api.wanxiangbook.com/{fullchain,privkey}.pem
#
# 部署步骤:
#   把本文件 scp 到服务器 /etc/nginx/sites-available/wanxiang
#   nginx -t && systemctl reload nginx
#
# 自动续期 (certbot 装完默认就有 cron, 90 天前自动续):
#   systemctl status certbot.timer
# ============================================================

# ---- 1. HTTP -> HTTPS 强制跳转 ----
# 留 80 端口给 Let's Encrypt 续期挑战 (.well-known/acme-challenge), 其它全跳 HTTPS.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.wanxiangbook.com wanxiangbook.com 104.224.156.240 _;

    # ACME 续期挑战必须走 HTTP, 不能 redirect
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    location / {
        return 301 https://api.wanxiangbook.com$request_uri;
    }
}

# ---- 2. HTTPS 主站 ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.wanxiangbook.com wanxiangbook.com;

    # ---- SSL 证书 (由 certbot 写入, 改域名时改这里) ----
    ssl_certificate     /etc/letsencrypt/live/api.wanxiangbook.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wanxiangbook.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.wanxiangbook.com/chain.pem;

    # ---- TLS 现代化 (TLS 1.2+, OWASP intermediate) ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ---- 安全 header (与 helmet 配合) ----
    # HSTS: 浏览器记 1 年, 期间访问该域名强制 HTTPS. preload 可选 (上 hstspreload.org 注册).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # 下面 helmet 已经发, 这里兜底防 nginx 直接回静态资源时遗漏
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    client_max_body_size 25M;
    access_log /var/log/nginx/wanxiang-access.log;
    error_log /var/log/nginx/wanxiang-error.log;

    # ---- 品牌主页 (静态) ----
    location = / {
        root /opt/wanxiang/web;
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300";
    }
    location = /index.html {
        root /opt/wanxiang/web;
        add_header Cache-Control "public, max-age=300";
    }
    location /web/ {
        alias /opt/wanxiang/web/;
        autoindex off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ---- APK 下载 ----
    location /dl/ {
        alias /opt/wanxiang/dl/;
        autoindex off;
        types {
            application/vnd.android.package-archive apk;
            text/html html;
        }
        sendfile on;
        sendfile_max_chunk 1m;
        if ($request_uri ~* "\.apk$") {
            add_header Content-Disposition 'attachment';
            add_header Cache-Control 'no-store';
        }
    }

    # ---- API + Admin 反代 :3000 ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;     # ⭐ 必须, 让 Node 知道原始协议是 https
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # iOS App 偶尔会用 HTTP/2, 后端 Node 不支持, 用 HTTP/1.1 兼容性最好
        proxy_request_buffering on;
    }
}
