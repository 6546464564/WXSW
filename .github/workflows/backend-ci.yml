name: Backend CI

# 万象书屋后端持续集成: PR / push 自动跑测试, main 分支构建 Docker 镜像.

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        env:
          BCRYPT_COST: 4               # CI 环境 fast-hash, 不然每个测试 600ms+
          ADMIN_INITIAL_PASSWORD: ci-test-password-12345
        run: npm test

      - name: Run integration tests (supertest)
        if: hashFiles('backend/test/api.test.js') != ''
        env:
          BCRYPT_COST: 4
          ADMIN_INITIAL_PASSWORD: ci-test-password-12345
          DEVICE_TOKEN_SECRET: ci-test-secret-aaaaaaaaaaaaaaaaaaaaaaaa
        run: node --test test/api.test.js

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push, sanity check)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: wanxiang-backend:latest,wanxiang-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
