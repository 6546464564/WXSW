name: WanxiangBook
options:
  bundleIdPrefix: com.wanxiang
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false
  # 万象书屋: 强制生成 shared scheme, 让 xcodebuild -scheme 找得到
  schemePathPrefix: ""
  # 万象书屋: 不生成 .xcworkspace, 单 .xcodeproj 够用
  groupOrdering:
    - order: [App, Theme, Networking, Database, BookSource, Features, Ad, Resources]

# 万象书屋: 显式定义 scheme, 避免 XcodeGen 默认 scheme platform 为空
schemes:
  WanxiangBook:
    build:
      targets:
        WanxiangBook: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WanxiangBookTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

# 全局 Swift 编译选项
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    # 万象书屋: 严格编译, 任何 warning 当 error 阻止合并 — 避免历史债
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO   # M0 阶段先 NO, M2 后期开 YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # 显式声明并发模型 (Swift 6 准备)
    SWIFT_STRICT_CONCURRENCY: minimal     # M2 后期可改 complete
    # 万象书屋: Xcode 26 必须显式声明 SUPPORTED_PLATFORMS, 否则 xcodebuild "no destinations" 错
    SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG WANXIANG_DEBUG"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: YES

targets:
  WanxiangBook:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/WanxiangBook
        excludes:
          - "Resources/legal/**"
          - "Resources/PrivacyInfo.xcprivacy"
          - "Resources/Assets.xcassets/**"
          - "Resources/*.lproj/**"
          - "Info.plist"
    resources:
      - path: Sources/WanxiangBook/Resources/legal
        type: folder
      - path: Sources/WanxiangBook/Resources/PrivacyInfo.xcprivacy
      - path: Sources/WanxiangBook/Resources/Assets.xcassets
      # 万象书屋: 多语言 — XcodeGen 自动识别 *.lproj 目录, 编译进 .ipa 各语种 bundle
      - path: Sources/WanxiangBook/Resources/zh-Hans.lproj
      - path: Sources/WanxiangBook/Resources/zh-Hant.lproj
    info:
      path: Sources/WanxiangBook/Info.plist
      properties:
        # 万象书屋: 跟 Android applicationId 一致
        CFBundleDisplayName: 万象书屋
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # 万象书屋: 多语言 — Base 简体, 同步支持繁体 (港台 App Store)
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleLocalizations:
          - zh-Hans
          - zh-Hant
          - en   # 占位; 暂不维护英文翻译, 系统 fallback Base
        UILaunchScreen:
          UIImageName: "LaunchLogo"
          UIColorName: "LaunchBackground"
          UIImageRespectsSafeAreaInsets: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # 万象书屋: ATT 文案 (M3 阶段细化)
        NSUserTrackingUsageDescription: "用于显示更相关的内容和广告,完全不收集用户身份"
        # 万象书屋: 备案下来切 https://api.wanxiangbook.com 后, 这段可以删
        # 万象书屋 (M2.6.3): 听书 / 有声 后台播放权限. 没这个 iOS 锁屏后会停 TTS.
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          # 万象书屋 (P0): 第三方书源大量是 http:// 域名 (笔趣阁/晋江老子站/七星阁/小说之家 等),
          # 封面/章节内容必须能拉. 上架时 App Store 审核备注会写"对接 100+ 公开第三方书源".
          NSAllowsArbitraryLoads: true
          NSExceptionDomains:
            "104.224.156.240":
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
            # 万象书屋: 本地开发模拟器走宿主机 :3000 (HTTP)
            "localhost":
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
            "127.0.0.1":
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        # 万象书屋: SDK 网络访问描述
        NSCameraUsageDescription: "扫描二维码导入书源"
        NSPhotoLibraryUsageDescription: "选择阅读器背景图"
        # 万象书屋 (M4): Document Types — 让 iOS 文件 App "用万象书屋打开 TXT/EPUB"
        CFBundleDocumentTypes:
          - CFBundleTypeName: "纯文本电子书"
            CFBundleTypeRole: "Viewer"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "public.plain-text"
              - "public.text"
          - CFBundleTypeName: "EPUB 电子书"
            CFBundleTypeRole: "Viewer"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "org.idpf.epub-container"
          - CFBundleTypeName: "MOBI / AZW 电子书"
            CFBundleTypeRole: "Viewer"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "com.amazon.mobi8-ebook"
              - "com.amazon.ebook"
              - "com.amazon.kindle-ebook"
          - CFBundleTypeName: "UMD 电子书"
            CFBundleTypeRole: "Viewer"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "public.data"
        # 万象书屋 (M3): 广告 SDK 必须列 SKAdNetwork ID, 否则 iOS 14.5+ 拿不到归因
        # CSJ Pangle 官方 23 个 + GDT 优量汇 官方 50 个 (含部分重复, 已去重)
