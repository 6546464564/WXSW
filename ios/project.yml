    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wanxiang.reader
        PRODUCT_NAME: WanxiangBook
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        DEVELOPMENT_TEAM: ""             # 用户填
        CODE_SIGN_STYLE: Automatic
        # 万象书屋: 模拟器构建不签名, 真机/Archive 时开
        CODE_SIGNING_ALLOWED: NO         # 让 xcodebuild build 不挑剔; 真机 Archive 时 Xcode GUI 自动开
        # 万象书屋: target 级也要显式声明, 否则 Xcode 26 "no destinations"
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        VALID_ARCHS: "arm64 arm64e x86_64"
        # 万象书屋 (M3): CSJ/GDT 是 ObjC 静态库混 framework, 必须 -ObjC 让链接器拉所有 category
        OTHER_LDFLAGS: "-ObjC"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    # 万象书屋 (M1): SwiftSoup 用于 CSS 选择器 + HTML 解析
    # M2.8: ZIPFoundation 用于 EPUB 解压 (EPUB 本质是 zip)
    # libxml2 是 iOS 系统库 (XPath 支持), JavaScriptCore 也是系统的, 都不需要 SPM
    # PDFKit 系统自带, 不需要依赖
    # M3 广告 SDK: 二进制 xcframework, 需要先跑 ./scripts/setup-ad-sdks.sh
    dependencies:
      - package: SwiftSoup
      - package: ZIPFoundation
      # 广告 SDK (从 Frameworks/ 引)
      # CSJ 7.6.0.3 全 slice OK (arm64 真机 + arm64 + x86_64 simulator)
      - framework: Frameworks/BUAdSDK.xcframework
        embed: true
      # 万象书屋: GDT 4.15.80 这版 simulator slice 只有 x86_64, 缺 arm64 simulator.
      # Apple Silicon 模拟器 (M1/M2/M3/M4 Mac) 编不过.
      # 真机 archive 时把下面两行注释解开 + 在 GdtAdProvider.swift 也解开 import:
      # - framework: Frameworks/GDTMobSDK.xcframework
      #   embed: true
      # - framework: Frameworks/Tquic.xcframework
      #   embed: true
      # 系统库 (CSJ/GDT 都需要)
      - sdk: WebKit.framework
      - sdk: AdSupport.framework
      - sdk: AppTrackingTransparency.framework
      - sdk: StoreKit.framework
      - sdk: CoreLocation.framework
      - sdk: SystemConfiguration.framework
      - sdk: CoreMotion.framework
      - sdk: CoreHaptics.framework        # CSJ CSJHapticPlayer
      - sdk: AVFoundation.framework
      - sdk: AVKit.framework
      - sdk: AudioToolbox.framework
      - sdk: Photos.framework
      - sdk: PhotosUI.framework
      - sdk: MessageUI.framework
      - sdk: MediaPlayer.framework
      - sdk: ImageIO.framework
      - sdk: CoreImage.framework
      - sdk: CoreText.framework
      - sdk: CoreTelephony.framework
      - sdk: Accelerate.framework
      - sdk: CoreML.framework             # CSJ MLFeatureValue/MLModel/MLSequence
      - sdk: MobileCoreServices.framework
      - sdk: AdServices.framework
        weak: true
      - sdk: AppClip.framework
        weak: true
      # libsqlite3 / libc++ / libresolv (CSJ 必须)
      - sdk: libc++.tbd
      - sdk: libresolv.tbd
      - sdk: libsqlite3.tbd
      - sdk: libz.tbd
      - sdk: libxml2.tbd
      - sdk: libbz2.tbd

  # 万象书屋: iOS 单元测试 target. 跑命令: `xcodebuild test -scheme WanxiangBook -destination 'platform=iOS Simulator,name=iPhone 15'`
  WanxiangBookTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/WanxiangBookTests
    dependencies:
      - target: WanxiangBook
    settings:
      base:
        # 测试无需签名
        CODE_SIGNING_ALLOWED: NO
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        # 万象书屋: 给测试 host App bundle id 后缀, 避免跟主 app 冲突
        PRODUCT_BUNDLE_IDENTIFIER: com.wanxiang.reader.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WanxiangBook.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/WanxiangBook"

# SwiftPM 依赖
packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.5"
  # M2.8.1.2: EPUB 容器是 zip, 用这个标准库解压
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.19"
